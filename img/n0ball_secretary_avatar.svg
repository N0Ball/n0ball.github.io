<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a3254"/>
      <stop offset="100%" stop-color="#060c1a"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="230" r="180" fill="url(#glowCenter)"/>

  <!-- Stars -->
  <circle cx="75"  cy="90"  r="1.8" fill="white" opacity="0.55"/>
  <circle cx="430" cy="75"  r="1.4" fill="white" opacity="0.45"/>
  <circle cx="390" cy="160" r="2.0" fill="white" opacity="0.65"/>
  <circle cx="120" cy="190" r="1.2" fill="white" opacity="0.40"/>
  <circle cx="460" cy="310" r="1.6" fill="white" opacity="0.50"/>
  <circle cx="55"  cy="360" r="1.8" fill="white" opacity="0.38"/>
  <circle cx="470" cy="180" r="1.0" fill="white" opacity="0.35"/>
  <circle cx="100" cy="430" r="1.4" fill="white" opacity="0.30"/>
  <circle cx="400" cy="420" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="310" cy="60"  r="1.0" fill="white" opacity="0.40"/>
  <circle cx="170" cy="80"  r="1.5" fill="white" opacity="0.45"/>

  <!-- Orbital ring (background) -->
  <ellipse cx="256" cy="245" rx="155" ry="42" stroke="#3a7fd4" stroke-width="1.5" fill="none" opacity="0.25" transform="rotate(-15 256 245)"/>

  <!-- Satellite dish bowl -->
  <path d="M168,275 Q256,148 344,275" stroke="#4a9eff" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Rim line across dish -->
  <line x1="168" y1="275" x2="344" y2="275" stroke="#3a7fd4" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Center rib -->
  <line x1="256" y1="148" x2="256" y2="275" stroke="#3a7fd4" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Left rib -->
  <line x1="210" y1="161" x2="210" y2="275" stroke="#3a7fd4" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Right rib -->
  <line x1="302" y1="161" x2="302" y2="275" stroke="#3a7fd4" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Feed arm -->
  <line x1="256" y1="275" x2="256" y2="226" stroke="#7ec8ff" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Feed horn dot -->
  <circle cx="256" cy="220" r="10" fill="#4a9eff" filter="url(#softglow)"/>
  <circle cx="256" cy="220" r="5"  fill="#c8e8ff"/>

  <!-- Mast -->
  <line x1="256" y1="275" x2="256" y2="325" stroke="#4a9eff" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Base -->
  <rect x="218" y="322" width="76" height="12" rx="6" fill="#4a9eff" filter="url(#glow)"/>

  <!-- Signal arcs (right side) -->
  <path d="M300,196 Q324,218 300,240" stroke="#7ec8ff" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.80" filter="url(#glow)"/>
  <path d="M322,177 Q356,213 322,249" stroke="#7ec8ff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.55" filter="url(#glow)"/>
  <path d="M344,158 Q390,208 344,258" stroke="#7ec8ff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.30"/>

  <!-- N0B text -->
  <text x="256" y="405"
        text-anchor="middle"
        fill="#ffffff"
        font-family="'Courier New', Courier, monospace"
        font-size="72"
        font-weight="700"
        letter-spacing="4"
        filter="url(#glow)">N0B</text>

  <!-- SECRETARY subtitle -->
  <text x="256" y="445"
        text-anchor="middle"
        fill="#4a9eff"
        font-family="'Courier New', Courier, monospace"
        font-size="21"
        font-weight="400"
        letter-spacing="6"
        opacity="0.88">SECRETARY</text>
</svg>
